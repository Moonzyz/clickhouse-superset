services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: fraud-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: fraud_db
      CLICKHOUSE_USER: fraud_user
      CLICKHOUSE_PASSWORD: fraud_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./clickhouse/data:/var/lib/clickhouse
      - ./clickhouse/logs:/var/log/clickhouse-server
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  superset:
    build:
      context: ./superset
    container_name: fraud-superset
    depends_on:
      - clickhouse
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "fraud-demo-secret-key-change-me"
    volumes:
      - ./superset_home:/app/superset_home
    command: >
      /bin/sh -c "
      superset db upgrade;
      superset fab create-admin
      --username admin
      --firstname Admin
      --lastname User
      --email admin@example.com
      --password admin || true;
      superset init;
      superset run -h 0.0.0.0 -p 8088
      "
    restart: unless-stopped